name: Mirror to render-oss

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to render-oss
        env:
          RENDER_OSS_MIRROR_TOKEN: ${{ secrets.RENDER_OSS_MIRROR_TOKEN }}
        run: |
          git push --force-with-lease \
            "https://x-access-token:${RENDER_OSS_MIRROR_TOKEN}@github.com/render-oss/render-cursor-plugin.git" \
            "HEAD:main"
